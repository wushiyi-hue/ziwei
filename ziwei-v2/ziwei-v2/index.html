<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紫微斗数 · 命盘推算</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8cc7a;
      --gold-dark: #9a7a2e;
      --ink: #0a0a0f;
      --ink-mid: #12121a;
      --ink-light: #1c1c2e;
      --red: #8b1a1a;
      --text: #e8dcc8;
      --text-dim: #8a7d6a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'Noto Serif SC', 'STSong', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139,26,26,0.04) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.03'%3E%3Cpath d='M30 0L60 30L30 60L0 30z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    header {
      text-align: center;
      padding: 64px 0 48px;
    }

    .header-subtitle {
      font-family: 'Cinzel Decorative', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold-dark);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(48px, 10vw, 80px);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 12px;
      line-height: 1;
      text-shadow: 0 0 60px rgba(201,168,76,0.2);
      display: inline-block;
    }

    h1::after {
      content: '';
      display: block;
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto 0;
    }

    .header-desc {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 2px;
      font-weight: 300;
    }

    .star-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin: 24px 0;
      font-size: 10px;
      color: var(--gold-dark);
      letter-spacing: 8px;
    }

    .form-card {
      background: linear-gradient(135deg, rgba(28,28,46,0.8), rgba(18,18,26,0.9));
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 2px;
      padding: 40px;
      position: relative;
      backdrop-filter: blur(10px);
    }

    .form-card::before, .form-card::after {
      content: '✦';
      position: absolute;
      font-size: 10px;
      color: var(--gold-dark);
    }
    .form-card::before { top: 12px; left: 12px; }
    .form-card::after { bottom: 12px; right: 12px; }

    .form-section-title {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 24px;
      font-family: 'Cinzel Decorative', serif;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .form-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent);
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }

    label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      font-weight: 300;
    }

    input, select, textarea {
      background: rgba(10,10,15,0.6);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 1px;
      color: var(--text);
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;
      padding: 12px 14px;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-appearance: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 0 1px rgba(201,168,76,0.1);
    }

    select option { background: var(--ink-light); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
      margin: 28px 0;
    }

    .gender-toggle { display: flex; border: 1px solid rgba(201,168,76,0.15); }

    .gender-btn {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 2px;
    }

    .gender-btn.active { background: rgba(201,168,76,0.15); color: var(--gold); }
    .gender-btn:hover:not(.active) { background: rgba(201,168,76,0.05); color: var(--text); }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08));
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold);
      font-family: 'Noto Serif SC', serif;
      font-size: 15px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    .submit-btn:hover::before { transform: translateX(0); }
    .submit-btn:hover { border-color: rgba(201,168,76,0.7); box-shadow: 0 0 20px rgba(201,168,76,0.1); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading { display: none; text-align: center; padding: 60px 40px; }
    .loading.visible { display: block; }

    .loading-circle {
      width: 60px;
      height: 60px;
      margin: 0 auto 24px;
      position: relative;
    }

    .loading-circle::before, .loading-circle::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid transparent;
    }

    .loading-circle::before { border-top-color: var(--gold); animation: spin 1.2s linear infinite; }
    .loading-circle::after { border-right-color: rgba(201,168,76,0.3); animation: spin 2s linear infinite reverse; inset: 8px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 3px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    .results { display: none; margin-top: 32px; animation: fadeUp 0.6s ease; }
    .results.visible { display: block; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .results-header { text-align: center; padding: 32px 0 24px; }

    .results-title {
      font-size: 13px;
      letter-spacing: 4px;
      color: var(--gold);
      font-family: 'Cinzel Decorative', serif;
    }

    .result-card {
      background: linear-gradient(135deg, rgba(28,28,46,0.7), rgba(18,18,26,0.8));
      border: 1px solid rgba(201,168,76,0.15);
      padding: 32px 36px;
      margin-bottom: 16px;
    }

    .result-card-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gold-dark);
      text-transform: uppercase;
      margin-bottom: 16px;
      font-family: 'Cinzel Decorative', serif;
    }

    .result-content {
      font-size: 14px;
      line-height: 2;
      color: var(--text);
      font-weight: 300;
      white-space: pre-wrap;
    }

    .streaming::after {
      content: '▋';
      animation: blink 0.8s step-end infinite;
      color: var(--gold);
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .error-msg {
      background: rgba(139,26,26,0.15);
      border: 1px solid rgba(139,26,26,0.3);
      padding: 16px 20px;
      color: #e88a8a;
      font-size: 13px;
      letter-spacing: 1px;
      display: none;
      margin-top: 16px;
    }

    .error-msg.visible { display: block; }

    footer {
      text-align: center;
      padding: 40px 0 20px;
      font-size: 10px;
      color: rgba(138,125,106,0.4);
      letter-spacing: 2px;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-card { padding: 24px 20px; }
      .result-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="header-subtitle">Purple Star Astrology</div>
      <h1>紫微斗数</h1>
      <div class="star-row">✦ &nbsp; ✦ &nbsp; ✦</div>
      <div class="header-desc">依生辰排盘 · 三层叠加推算 · 论命运走向</div>
    </header>

    <div class="form-card">
      <div class="form-section-title">出生信息</div>

      <div class="form-grid">
        <div class="form-group">
          <label>出生年份</label>
          <input type="number" id="birthYear" placeholder="如 1998" min="1900" max="2024">
        </div>
        <div class="form-group">
          <label>出生月份</label>
          <select id="birthMonth">
            <option value="">选择月份</option>
            <option value="1">一月</option><option value="2">二月</option>
            <option value="3">三月</option><option value="4">四月</option>
            <option value="5">五月</option><option value="6">六月</option>
            <option value="7">七月</option><option value="8">八月</option>
            <option value="9">九月</option><option value="10">十月</option>
            <option value="11">十一月</option><option value="12">十二月</option>
          </select>
        </div>
        <div class="form-group">
          <label>出生日期</label>
          <input type="number" id="birthDay" placeholder="如 15" min="1" max="31">
        </div>
      </div>

      <div class="form-grid-2">
        <div class="form-group">
          <label>出生时辰</label>
          <select id="birthHour">
            <option value="">选择时辰</option>
            <option value="子时">子时 (23:00–01:00)</option>
            <option value="丑时">丑时 (01:00–03:00)</option>
            <option value="寅时">寅时 (03:00–05:00)</option>
            <option value="卯时">卯时 (05:00–07:00)</option>
            <option value="辰时">辰时 (07:00–09:00)</option>
            <option value="巳时">巳时 (09:00–11:00)</option>
            <option value="午时">午时 (11:00–13:00)</option>
            <option value="未时">未时 (13:00–15:00)</option>
            <option value="申时">申时 (15:00–17:00)</option>
            <option value="酉时">酉时 (17:00–19:00)</option>
            <option value="戌时">戌时 (19:00–21:00)</option>
            <option value="亥时">亥时 (21:00–23:00)</option>
            <option value="不知道时辰">不知道时辰</option>
          </select>
        </div>
        <div class="form-group">
          <label>性别</label>
          <div class="gender-toggle">
            <button class="gender-btn active" onclick="setGender('女命', this)">女命</button>
            <button class="gender-btn" onclick="setGender('男命', this)">男命</button>
          </div>
        </div>
      </div>

      <div class="divider"></div>
      <div class="form-section-title">推算方向</div>

      <div class="form-grid-2">
        <div class="form-group">
          <label>想了解的年份</label>
          <input type="number" id="targetYear" placeholder="如 2026" min="2020" max="2040" value="2026">
        </div>
        <div class="form-group">
          <label>具体想问的事（可选）</label>
          <input type="text" id="question" placeholder="如：求职、感情、财运…">
        </div>
      </div>

      <div class="form-group" style="margin-top:8px">
        <label>补充背景（可选）</label>
        <textarea id="context" placeholder="可以告诉我你目前的状况、正在面对的选择，推算会更准确…"></textarea>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="submit-btn" id="submitBtn" onclick="calculate()">
        ✦ &nbsp; 起盘推算 &nbsp; ✦
      </button>
    </div>

    <div class="loading" id="loading">
      <div class="loading-circle"></div>
      <div class="loading-text" id="loadingText">正在起盘排星…</div>
    </div>

    <div class="results" id="results">
      <div class="results-header">
        <div class="results-title">命盘推算结果</div>
        <div class="star-row" style="margin-top:12px">✦ &nbsp; ✦ &nbsp; ✦</div>
      </div>

      <div class="result-card" id="chartCard" style="display:none">
        <div class="result-card-label">本命格局概览</div>
        <div class="result-content" id="chartContent"></div>
      </div>

      <div class="result-card">
        <div class="result-card-label" id="analysisLabel">流年分析</div>
        <div class="result-content streaming" id="analysisContent"></div>
      </div>

      <div class="result-card" id="conclusionCard" style="display:none">
        <div class="result-card-label">确定性结论</div>
        <div class="result-content" id="conclusionContent"></div>
      </div>
    </div>

    <footer>
      紫微斗数 · 仅供参考 · 命运在己不在星
    </footer>

  </div>

  <script>
    let gender = '女命';

    function setGender(val, btn) {
      gender = val;
      document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    const loadingTexts = [
      '正在起盘排星…',
      '安置紫微诸星…',
      '推算大限流年…',
      '三层叠加取交集…',
      '确定性结论生成中…'
    ];

    let loadingInterval;

    function startLoadingAnimation() {
      let i = 0;
      const el = document.getElementById('loadingText');
      el.textContent = loadingTexts[0];
      loadingInterval = setInterval(() => {
        i = (i + 1) % loadingTexts.length;
        el.textContent = loadingTexts[i];
      }, 2000);
    }

    function stopLoadingAnimation() { clearInterval(loadingInterval); }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    async function calculate() {
      hideError();

      const birthYear = document.getElementById('birthYear').value;
      const birthMonth = document.getElementById('birthMonth').value;
      const birthDay = document.getElementById('birthDay').value;
      const birthHour = document.getElementById('birthHour').value;
      const targetYear = document.getElementById('targetYear').value;
      const question = document.getElementById('question').value;
      const context = document.getElementById('context').value;

      if (!birthYear || !birthMonth || !birthDay || !birthHour) {
        showError('请填写完整的出生信息（年、月、日、时辰）');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      document.getElementById('loading').classList.add('visible');
      document.getElementById('results').classList.remove('visible');
      document.getElementById('chartCard').style.display = 'none';
      document.getElementById('conclusionCard').style.display = 'none';
      document.getElementById('analysisContent').textContent = '';
      document.getElementById('analysisContent').classList.add('streaming');

      startLoadingAnimation();

      const systemPrompt = `你是一位精通紫微斗数的命理大师，拥有数十年排盘推算经验。

你的任务：
1. 根据用户提供的生辰信息，完整推算紫微斗数命盘
2. 使用三层叠加模型：本命盘（50%权重）× 大限盘（30%权重）× 流年盘（20%权重）
3. 给出确定性结论，不谈概率，不做模糊表述

推算原则：
- 先确定五行局（根据年干和命宫）
- 安紫微星及十四主星
- 安辅星、煞星、神煞
- 推算大限走向（男命阳年顺行、阴年逆行；女命阳年逆行、阴年顺行）
- 叠加流年四化（根据流年天干）
- 多层星曜同时指向同一结论时，给出确定性判断

输出格式（严格按照此格式）：
【命盘格局】
简明列出命宫主星、关键宫位格局、本命最强宫位，200字以内

【${targetYear}年流年分析】
三层叠加详细分析，重点聚焦用户问题，给出具体判断，400字以内

【确定性结论】
用简洁有力的语言，分点列出确定会发生的事，不做模糊表述

用字风格：简练、有力、不废话。`;

      const userPrompt = `我的生辰信息：
- 出生时间：公历 ${birthYear}年${birthMonth}月${birthDay}日 ${birthHour}
- 性别：${gender}
- 想了解的年份：${targetYear}年
${question ? `- 具体想问：${question}` : ''}
${context ? `- 补充背景：${context}` : ''}

请帮我推算紫微斗数命盘，并分析${targetYear}年的运势走向。`;

      try {
        // Call our own backend proxy instead of Anthropic directly
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system: systemPrompt,
            messages: [{ role: 'user', content: userPrompt }]
          })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || `请求失败 ${response.status}`);
        }

        const data = await response.json();
        const fullText = data.content.map(c => c.text || '').join('');

        stopLoadingAnimation();
        document.getElementById('loading').classList.remove('visible');
        document.getElementById('results').classList.add('visible');

        const chartMatch = fullText.match(/【命盘格局】([\s\S]*?)(?=【|$)/);
        const analysisMatch = fullText.match(/【\d{4}年流年分析】([\s\S]*?)(?=【|$)/) ||
                              fullText.match(/【.*?流年分析】([\s\S]*?)(?=【|$)/);
        const conclusionMatch = fullText.match(/【确定性结论】([\s\S]*?)$/);

        if (chartMatch) {
          document.getElementById('chartCard').style.display = 'block';
          document.getElementById('chartContent').textContent = chartMatch[1].trim();
        }

        document.getElementById('analysisLabel').textContent = `${targetYear}年流年分析`;
        const analysisEl = document.getElementById('analysisContent');
        analysisEl.classList.remove('streaming');

        const analysisText = analysisMatch ? analysisMatch[1].trim() : fullText;
        typewriterEffect(analysisEl, analysisText, 10);

        if (conclusionMatch) {
          setTimeout(() => {
            document.getElementById('conclusionCard').style.display = 'block';
            document.getElementById('conclusionContent').textContent = conclusionMatch[1].trim();
          }, analysisText.length * 10 + 500);
        }

      } catch (err) {
        stopLoadingAnimation();
        document.getElementById('loading').classList.remove('visible');
        showError('推算出现错误，请稍后再试。' + (err.message || ''));
      }

      btn.disabled = false;
    }

    function typewriterEffect(el, text, speed) {
      el.textContent = '';
      el.classList.add('streaming');
      let i = 0;
      const interval = setInterval(() => {
        if (i < text.length) {
          el.textContent += text[i++];
        } else {
          clearInterval(interval);
          el.classList.remove('streaming');
        }
      }, speed);
    }
  </script>
</body>
</html>
